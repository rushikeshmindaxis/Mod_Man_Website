<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 150" width="300" height="150">
  <!-- Background -->
  <rect width="300" height="150" fill="white" rx="8"/>
  
  <!-- Logo Icon: stylized M figure (inspired by Mod Men logo) -->
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3001B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B0000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Abstract M figure icon -->
  <g transform="translate(40, 10)">
    <!-- Circle dot on top -->
    <circle cx="55" cy="8" r="8" fill="url(#redGrad)"/>
    <!-- Left arch -->
    <path d="M20 75 Q20 30 45 30 Q55 30 55 45" stroke="url(#redGrad)" stroke-width="14" fill="none" stroke-linecap="round"/>
    <!-- Right arch -->
    <path d="M55 45 Q55 30 65 30 Q90 30 90 75" stroke="url(#redGrad)" stroke-width="14" fill="none" stroke-linecap="round"/>
    <!-- Small curl left -->
    <path d="M20 75 Q15 80 20 85" stroke="url(#redGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Text: MOD MEN -->
  <text x="155" y="70" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="url(#redGrad)" text-anchor="middle" letter-spacing="3">MOD</text>
  <text x="155" y="105" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#C41E3A" text-anchor="middle" letter-spacing="3">MEN</text>
</svg>
